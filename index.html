<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sorteo BTS Lima 2025 — Verificación y Sorteos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --purple-deep:   #0d0010;
      --purple-mid:    #1a0030;
      --purple-bright: #7b2fff;
      --purple-glow:   #a855f7;
      --pink:          #e040fb;
      --gold:          #ffd700;
      --white:         #f5f0ff;
      --gray:          #9d8faa;
      --success:       #00e5a0;
      --error:         #ff4d6d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--purple-deep);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    #stars-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1; opacity: 0.4;
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(123,47,255,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(224,64,251,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(26,0,48,0.6) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 2; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 40px 20px; gap: 24px;
    }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 15px; animation: fadeDown 0.8s ease both; }
    .crown { font-size: 2.2rem; display: block; margin-bottom: 8px; filter: drop-shadow(0 0 12px var(--gold)); animation: floatCrown 3s ease-in-out infinite; }
    @keyframes floatCrown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .logo-text {
      font-family: 'Playfair Display', serif; font-weight: 900; font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: -2px; line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, var(--purple-glow) 40%, var(--pink) 80%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(168,85,247,0.6));
    }
    .subtitle { margin-top: 12px; font-size: 0.9rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: var(--gray); }
    .subtitle span { color: var(--purple-glow); }
    .divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--purple-glow), transparent); margin: 20px auto 0; }

    /* ── CARD BASE ── */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(168,85,247,0.25);
      border-radius: 24px; padding: 40px;
      width: 100%; max-width: 480px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(168,85,247,0.1), 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: fadeUp 0.9s ease 0.15s both;
    }
    .card-title {
      font-size: 0.75rem; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
      color: var(--purple-glow); margin-bottom: 28px; text-align: center;
    }

    /* ── TARJETA: SORTEOS PRINCIPALES (GOLD THEME) ── */
    .card.vip-card {
      border: 1px solid rgba(255,215,0,0.4);
      background: linear-gradient(180deg, rgba(255,215,0,0.05) 0%, rgba(255,255,255,0.02) 100%);
      box-shadow: 0 0 40px rgba(255,215,0,0.1), inset 0 1px 0 rgba(255,215,0,0.2);
    }
    .card.vip-card .card-title { color: var(--gold); }
    
    .main-raffle-item {
      text-align: center; margin-bottom: 30px;
      padding-bottom: 30px; border-bottom: 1px dashed rgba(255,215,0,0.2);
    }
    .main-raffle-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    
    .vip-title {
      font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold);
      line-height: 1.2; margin-bottom: 8px; text-shadow: 0 0 15px rgba(255,215,0,0.3);
    }
    .vip-date { font-size: 0.85rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
    
    /* Contador VIP */
    .vip-timer { display: flex; justify-content: center; gap: 12px; }
    .t-box {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.3);
      border-radius: 12px; width: 65px; height: 70px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: inset 0 0 15px rgba(255,215,0,0.05);
    }
    .t-val { font-size: 1.6rem; font-weight: bold; color: var(--white); font-family: 'Playfair Display', serif; }
    .t-lbl { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-top: 2px;}

    /* ── INPUTS & BOTONES ── */
    .input-wrap { position: relative; margin-bottom: 20px; }
    .input-label { display: block; font-size: 0.72rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; }
    .input-field {
      width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(168,85,247,0.3);
      border-radius: 12px; padding: 16px 20px; font-family: 'DM Sans', sans-serif; font-size: 1rem;
      color: var(--white); outline: none; transition: 0.3s; letter-spacing: 0.5px;
    }
    .input-field:focus { border-color: var(--purple-glow); background: rgba(123,47,255,0.08); box-shadow: 0 0 0 4px rgba(168,85,247,0.15); }
    
    .btn {
      width: 100%; padding: 16px; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden; transition: 0.2s;
      background: linear-gradient(135deg, var(--purple-bright), var(--pink)); color: #fff;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(123,47,255,0.55); }

    /* ── VERIFICACIÓN RESULTADOS ── */
    .result { margin-top: 28px; border-radius: 16px; padding: 24px 20px; text-align: center; display: none; animation: fadeUp 0.5s both; }
    .result.success { display: block; background: rgba(0,229,160,0.08); border: 1.5px solid rgba(0,229,160,0.35); }
    .result.error { display: block; background: rgba(255,77,109,0.08); border: 1.5px solid rgba(255,77,109,0.3); }
    .result.loading { display: block; background: rgba(168,85,247,0.06); border: 1.5px solid rgba(168,85,247,0.25); }
    .result-icon { font-size: 2.8rem; margin-bottom: 10px; display: block; line-height: 1; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; margin-bottom: 6px; }
    .result.success .result-title { color: var(--success); }
    .result.error .result-title { color: var(--error); }
    .result-name { font-size: 1rem; color: var(--white); font-weight: 500; margin-bottom: 4px; }
    .result-msg { font-size: 0.82rem; color: var(--gray); line-height: 1.5; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid rgba(168,85,247,0.2); border-top-color: var(--purple-glow); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MINI SORTEOS / RULETA ── */
    .raffle-info { text-align: center; margin-bottom: 20px; }
    .raffle-name { font-size: 1.5rem; color: var(--pink); font-family: 'Playfair Display', serif; margin-bottom: 5px; }
    .raffle-countdown { font-size: 1.2rem; font-weight: bold; color: var(--white); letter-spacing: 2px; }
    
    .roulette-container {
      background: rgba(0, 0, 0, 0.4); border: 2px solid var(--purple-glow); border-radius: 12px;
      height: 120px; overflow: hidden; position: relative; margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    .roulette-container::before, .roulette-container::after { content: ''; position: absolute; left: 0; right: 0; height: 30px; z-index: 2; pointer-events: none; }
    .roulette-container::before { top: 0; background: linear-gradient(to bottom, rgba(13,0,16,1), transparent); }
    .roulette-container::after { bottom: 0; background: linear-gradient(to top, rgba(13,0,16,1), transparent); }
    
    .roulette-selector {
      position: absolute; top: 50%; left: 0; right: 0; height: 40px; margin-top: -20px;
      border-top: 2px solid var(--gold); border-bottom: 2px solid var(--gold);
      background: rgba(255, 215, 0, 0.1); z-index: 1; pointer-events: none;
    }
    .roulette-track { position: absolute; top: 0; left: 0; right: 0; }
    .roulette-item { height: 40px; line-height: 40px; text-align: center; font-size: 1.1rem; font-weight: bold; color: rgba(255,255,255,0.5); transition: color 0.3s; }
    .roulette-item.winner-highlight { color: var(--success); font-size: 1.3rem; text-shadow: 0 0 10px var(--success); }

    .winners-list { margin-top: 20px; border-top: 1px solid rgba(168,85,247,0.3); padding-top: 15px; }
    .winner-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; }
    .winner-item strong { color: var(--gold); }
    .winner-item span { color: var(--white); font-weight: bold; }

    /* ── FOOTER & UTILS ── */
    .footer { margin-top: 20px; text-align: center; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(157,143,170,0.4); padding-bottom: 40px; }
    .live-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.65rem; letter-spacing: 2px; color: var(--success); margin-top: 16px; text-transform: uppercase; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; box-shadow: 0 0 6px var(--success); }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="page">
  <header class="header">
    <span class="crown">♛</span>
    <div class="logo-text">BTS</div>
    <p class="subtitle">Lima, Perú &nbsp;·&nbsp; <span>Sorteo de Entradas</span></p>
    <div class="divider"></div>
  </header>

  <div class="card">
    <p class="card-title">✦ Verifica si ya estás participando ✦</p>
    <label class="input-label" for="username">Tu nombre de usuario</label>
    <div class="input-wrap">
      <input id="username" class="input-field" type="text" placeholder="Escribe tu usuario de TikTok @..." autocomplete="off" spellcheck="false" />
    </div>
    <button class="btn" id="checkBtn" onclick="verificarUsuario()">Verificar</button>
    <div id="result" class="result"></div>
    <div style="text-align:center;">
      <span class="live-badge"><span class="live-dot"></span>Datos en tiempo real</span>
    </div>
  </div>

  <div class="card vip-card" id="main-raffles-container" style="display: none;">
    <p class="card-title">✦ Sorteo Principal ✦</p>
    <div id="main-raffles-list">
      </div>
  </div>

  <div class="card">
    <p class="card-title">✦ Sorteos Diarios (Previa) ✦</p>
    
    <div class="raffle-info" id="raffle-info">
      <div class="raffle-name">Cargando sorteos...</div>
      <div class="raffle-countdown">--:--:--</div>
    </div>

    <div class="roulette-container">
      <div class="roulette-selector"></div>
      <div class="roulette-track" id="roulette-track"></div>
    </div>

    <div class="winners-list" id="winners-list">
      <p class="input-label" style="text-align:center; margin-bottom: 15px;">Ganadores Anteriores</p>
    </div>
  </div>

  <footer class="footer">
    <strong>BTS ARMY Lima</strong> &nbsp;·&nbsp; Sorteo oficial &nbsp;·&nbsp; <strong>Contacto: 933201177</strong>
  </footer>
</div>

<script>
  // =========================================================
  // 1. CONFIGURACIÓN DE FIREBASE
  // =========================================================
  const firebaseConfig = {
    apiKey:            "AIzaSyBv6dj9jf8UaWx3ob_iz_DzdBlqWtcNJu8",
    authDomain:        "sorteo-56316.firebaseapp.com",
    databaseURL:       "https://sorteo-56316-default-rtdb.firebaseio.com",
    projectId:         "sorteo-56316",
    storageBucket:     "sorteo-56316.firebasestorage.app",
    messagingSenderId: "607480573121",
    appId:             "1:607480573121:web:7d091e0d9a59847ddd3840"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const FIREBASE_PATH = "usuarios";
  const GANADORES_PATH = "mini_sorteos_ganadores";

  // =========================================================
  // 2. CONFIGURACIÓN DE LISTAS DE SORTEOS
  // =========================================================

  // 🔴 A) LOS PREMIOS GORDOS FIJADOS (Sin ruleta, puro contador majestuoso)
  const sorteosPrincipalesConfig = [
    { 
      id: 'principal_1', 
      titulo: '1 Entrada Doble | ZONA CAMPO 9.10', 
      fecha: '2026-04-10T17:00:00-05:00' // 10 de Abril, 5:00 PM (Lima)
    },
    { 
      id: 'principal_2', 
      titulo: '1 Entrada Doble | ZONA CAMPO 10.10', 
      fecha: '2026-04-10T18:00:00-05:00' // 10 de Abril, 5:00 PM (Lima)
    }
    // Puedes agregar un segundo premio gordo aquí si lo deseas
  ];

  // 🟣 B) LOS MINI SORTEOS (Cola de espera, con ruleta automática)
  const sorteosConfig = [
    { id: 'sorteo_1', titulo: '1er Sorteo - 50 SOLES',  fecha: '2026-04-01T18:00:00-05:00' },
    { id: 'sorteo_2', titulo: '2do Sorteo - 50 SOLES | SORTEADO DE NUEVO',  fecha: '2026-04-02T18:00:00-05:00' },
    { id: 'sorteo_3', titulo: '2do Sorteo - 50 SOLES',  fecha: '2026-04-02T19:11:00-05:00' },
    { id: 'sorteo_4', titulo: 'SORTEO SORPTESA',        fecha: '2026-04-04T18:00:00-05:00' },
    { id: 'sorteo_5', titulo: 'SORTEO SORPRESA',        fecha: '2026-04-05T18:00:00-05:00' }
  ];

  // Variables Globales
  let todosLosUsuarios = ["Cargando..."]; 
  let sorteoActivo = null;
  let timerInterval = null;
  let ruletaGirando = false;
  let slowSpinInterval = null;

  // =========================================================
  // 3. INICIALIZACIÓN
  // =========================================================
  window.onload = async () => {
    initStars();
    iniciarSorteosPrincipales(); // Inicia los relojes estáticos
    await cargarUsuariosParaRuleta();
    iniciarRuletaLenta();
    gestionarSorteos(); // Inicia la cola de mini sorteos
  };

  async function cargarUsuariosParaRuleta() {
    try {
      const snapshot = await db.ref(FIREBASE_PATH).once('value');
      if (snapshot.exists()) {
        const data = snapshot.val();
        const nombres = Object.values(data).map(u => u.usuario_tiktok || u.nombre || "").filter(n => n.trim() !== "");
        if(nombres.length > 0) todosLosUsuarios = nombres;
      }
    } catch (e) {
      console.error("Error cargando usuarios", e);
      todosLosUsuarios = ["ARMY_1", "ARMY_2", "ARMY_3"];
    }
  }

  // =========================================================
  // 4. LÓGICA DE SORTEOS PRINCIPALES (Contadores Fijos)
  // =========================================================
  function iniciarSorteosPrincipales() {
    const container = document.getElementById('main-raffles-container');
    const list = document.getElementById('main-raffles-list');

    if (sorteosPrincipalesConfig.length === 0) return;
    container.style.display = 'block'; // Mostramos la tarjeta

    let html = '';
    sorteosPrincipalesConfig.forEach((sorteo, index) => {
      // Formatear la fecha para que se vea bonita (ej: "10 de Abril, 05:00 PM")
      const fechaElegante = new Date(sorteo.fecha).toLocaleDateString('es-PE', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit', hour12: true });

      html += `
        <div class="main-raffle-item">
          <div class="vip-title">${sorteo.titulo}</div>
          <div class="vip-date">${fechaElegante}</div>
          <div class="vip-timer" id="timer-vip-${index}">
            <div class="t-box"><span class="t-val" id="vd-${index}">00</span><span class="t-lbl">Días</span></div>
            <div class="t-box"><span class="t-val" id="vh-${index}">00</span><span class="t-lbl">Hrs</span></div>
            <div class="t-box"><span class="t-val" id="vm-${index}">00</span><span class="t-lbl">Min</span></div>
            <div class="t-box"><span class="t-val" id="vs-${index}">00</span><span class="t-lbl">Seg</span></div>
          </div>
        </div>`;
    });
    list.innerHTML = html;

    // Actualizador de reloj por segundo para los principales
    setInterval(() => {
      const ahora = new Date().getTime();
      sorteosPrincipalesConfig.forEach((sorteo, index) => {
        const distancia = new Date(sorteo.fecha).getTime() - ahora;
        const el = document.getElementById(`timer-vip-${index}`);
        if (!el) return;

        if (distancia <= 0) {
          el.innerHTML = `<div style="color: var(--success); font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-top: 10px; text-shadow: 0 0 10px var(--success);">¡ES HOY! 💜</div>`;
        } else {
          const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
          const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
          const s = Math.floor((distancia % (1000 * 60)) / 1000);

          document.getElementById(`vd-${index}`).innerText = d.toString().padStart(2, '0');
          document.getElementById(`vh-${index}`).innerText = h.toString().padStart(2, '0');
          document.getElementById(`vm-${index}`).innerText = m.toString().padStart(2, '0');
          document.getElementById(`vs-${index}`).innerText = s.toString().padStart(2, '0');
        }
      });
    }, 1000);
  }

  // =========================================================
  // 5. LÓGICA DE MINI SORTEOS Y RULETA
  // =========================================================
  function gestionarSorteos() {
    db.ref(GANADORES_PATH).on('value', (snapshot) => {
      actualizarInterfazSorteos(snapshot.exists() ? snapshot.val() : {});
    });
  }

  function actualizarInterfazSorteos(ganadoresDB) {
    if (ruletaGirando) return;

    const ahora = new Date().getTime();
    let proximoSorteo = null;
    let htmlGanadores = '';

    for (const sorteo of sorteosConfig) {
      const tiempoSorteo = new Date(sorteo.fecha).getTime();
      const yaSeSorteo = ganadoresDB[sorteo.id] !== undefined;

      if (yaSeSorteo) {
        const ganadorOficial = ganadoresDB[sorteo.id];
        
        // Ventana de Gracia de 1 minuto + Caché del navegador
        const tiempoGracia = tiempoSorteo + 60000; 
        const yaVioAnimacion = localStorage.getItem('animado_' + sorteo.id);

        if (ahora <= tiempoGracia && !yaVioAnimacion) {
          localStorage.setItem('animado_' + sorteo.id, 'true'); 
          clearInterval(timerInterval); 
          ruletaGirando = true; 
          animarRuletaHastaGanador(ganadorOficial, sorteo);
          return; 
        } else {
          htmlGanadores += `<div class="winner-item"><strong>${sorteo.titulo}</strong><span>@${ganadorOficial}</span></div>`;
        }
      } else if (!proximoSorteo && tiempoSorteo > ahora) {
        proximoSorteo = sorteo;
      } else if (!proximoSorteo && tiempoSorteo <= ahora) {
        proximoSorteo = sorteo;
      }
    }

    const listaGanadoresDiv = document.getElementById('winners-list');
    if (htmlGanadores === '') {
      listaGanadoresDiv.innerHTML = `<p class="input-label" style="text-align:center; margin-bottom: 15px;">Ganadores Anteriores</p><p style="text-align:center; color: var(--gray); font-size: 0.8rem;">Aún no hay ganadores.</p>`;
    } else {
      listaGanadoresDiv.innerHTML = `<p class="input-label" style="text-align:center; margin-bottom: 15px;">Ganadores Anteriores</p>` + htmlGanadores;
    }

    if (proximoSorteo) {
      sorteoActivo = proximoSorteo;
      document.querySelector('.raffle-name').innerText = proximoSorteo.titulo;
      iniciarTemporizador(new Date(proximoSorteo.fecha).getTime());
    } else {
      document.querySelector('.raffle-name').innerText = "¡Mini Sorteos Finalizados!";
      document.querySelector('.raffle-countdown').innerText = "Esperando el Premio Mayor";
      clearInterval(timerInterval);
    }
  }

  function iniciarTemporizador(fechaObjetivo) {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const ahora = new Date().getTime();
      const distancia = fechaObjetivo - ahora;

      if (distancia <= 0) {
        clearInterval(timerInterval);
        document.querySelector('.raffle-countdown').innerText = "¡SORTEANDO AHORA!";
        ejecutarSorteo(sorteoActivo);
      } else {
        const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
        const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distancia % (1000 * 60)) / 1000);

        let textoReloj = "";
        if (d > 0) textoReloj += `${d}d `;
        textoReloj += `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        document.querySelector('.raffle-countdown').innerText = textoReloj;
      }
    }, 1000);
  }

  function iniciarRuletaLenta() {
    const track = document.getElementById('roulette-track');
    track.innerHTML = ''; track.style.transition = 'none';
    for(let i = 0; i < 6; i++) agregarNombreAleatorio(track);

    let posicionY = 0;
    cancelAnimationFrame(slowSpinInterval); 
    
    function animarScroll() {
      posicionY -= 2; // Velocidad de caída
      track.style.transform = `translateY(${posicionY}px)`;

      if (posicionY <= -40) {
        track.removeChild(track.firstChild); 
        agregarNombreAleatorio(track);       
        posicionY += 40;                     
        track.style.transform = `translateY(${posicionY}px)`;
      }
      slowSpinInterval = requestAnimationFrame(animarScroll);
    }
    slowSpinInterval = requestAnimationFrame(animarScroll);
  }

  function agregarNombreAleatorio(track) {
    const lista = todosLosUsuarios.length > 0 ? todosLosUsuarios : ["Cargando..."];
    const randomName = lista[Math.floor(Math.random() * lista.length)];
    const div = document.createElement('div');
    div.className = 'roulette-item'; div.innerText = `@${randomName}`;
    track.appendChild(div);
  }

  async function ejecutarSorteo(sorteo) {
    if (ruletaGirando) return;
    ruletaGirando = true;
    localStorage.setItem('animado_' + sorteo.id, 'true');

    // Evitar que la misma persona gane dos veces
    const snapshotGanadores = await db.ref(GANADORES_PATH).once('value');
    const ganadoresPrevios = snapshotGanadores.exists() ? Object.values(snapshotGanadores.val()) : [];
    const usuariosDisponibles = todosLosUsuarios.filter(u => !ganadoresPrevios.includes(u));
    const listaFinal = usuariosDisponibles.length > 0 ? usuariosDisponibles : todosLosUsuarios;

    const ganadorLocal = listaFinal[Math.floor(Math.random() * listaFinal.length)];
    let ganadorFinal = ganadorLocal;

    const refSorteo = db.ref(`${GANADORES_PATH}/${sorteo.id}`);
    try {
      const result = await refSorteo.transaction((estadoActual) => {
        return estadoActual === null ? ganadorLocal : undefined;
      });
      ganadorFinal = result.committed ? ganadorLocal : result.snapshot.val();
    } catch (e) { console.error("Error transaccion:", e); }

    animarRuletaHastaGanador(ganadorFinal, sorteo);
  }

  function animarRuletaHastaGanador(nombreGanador, sorteo) {
    cancelAnimationFrame(slowSpinInterval); 
    const track = document.getElementById('roulette-track');
    track.innerHTML = ''; 
    track.style.transition = 'transform 3s cubic-bezier(0.15, 0.9, 0.25, 1)';
    
    const spinCount = 30; 
    for(let i=0; i<spinCount; i++) agregarNombreAleatorio(track);

    const winnerDiv = document.createElement('div');
    winnerDiv.className = 'roulette-item winner-highlight'; winnerDiv.innerText = `@${nombreGanador}`;
    track.appendChild(winnerDiv);

    for(let i=0; i<3; i++) agregarNombreAleatorio(track);

    const targetY = -(spinCount * 40 - 40);
    track.style.transform = 'translateY(0px)'; track.offsetHeight; 
    track.style.transform = `translateY(${targetY}px)`;

    setTimeout(() => {
      ruletaGirando = false;
      db.ref(GANADORES_PATH).once('value').then(snap => {
        actualizarInterfazSorteos(snap.exists() ? snap.val() : {});
        setTimeout(iniciarRuletaLenta, 3000); 
      });
    }, 3500);
  }

  // =========================================================
  // 6. FUNCIONES DE VERIFICACIÓN (ORIGINAL)
  // =========================================================
  async function verificarUsuario() {
    const input = document.getElementById('username');
    const result = document.getElementById('result');
    const btn = document.getElementById('checkBtn');
    const username = input.value.trim().toLowerCase().replace(/^@/, '');
    if (!username) { shakeInput(input); return; }

    const keySegura = username.replace(/\./g, "-").replace(/#/g, "-").replace(/\$/g, "-").replace(/\[/g, "-").replace(/\]/g, "-");
    btn.disabled = true; result.className = 'result loading';
    result.innerHTML = `<div class="spinner"></div><div class="result-title">Buscando...</div><div class="result-msg">Consultando la lista...</div>`;

    try {
      const snapshot = await db.ref(`${FIREBASE_PATH}/${keySegura}`).get();
      if (snapshot.exists()) {
        const data = snapshot.val();
        const nombreReal = data.usuario_tiktok ? data.usuario_tiktok : username;
        result.className = 'result success';
        result.innerHTML = `<span class="result-icon">🎉</span><div class="result-title">¡Estás registrado!</div><div class="result-name">@${sanitize(nombreReal)}</div>
        <div class="result-msg">Tu usuario está en la lista del sorteo.
        <br>¡Buena suerte, ARMY! 💜</div>`;
      } else {
        result.className = 'result error';
        result.innerHTML = `<span class="result-icon">😔</span><div class="result-title">No encontrado</div><div class="result-name">@${sanitize(username)}</div><div class="result-msg">Este usuario no está en la lista. <br>Escribenos a 933201177</div>`;
      }
    } catch (err) {
      result.className = 'result error'; result.innerHTML = `<span class="result-icon">⚠️</span><div class="result-title">Error</div><div class="result-msg">Error de conexión.</div>`;
    } finally { btn.disabled = false; }
  }

  function sanitize(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function shakeInput(el) { el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'shake 0.4s ease'; el.focus(); }
  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }`; document.head.appendChild(shakeStyle);

  // =========================================================
  // 7. FONDO ESTRELLAS
  // =========================================================
  function initStars() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function init() { stars = Array.from({ length: 140 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.2 + 0.2, a: Math.random(), speed: Math.random() * 0.005 + 0.002 })); }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a += s.speed; const alpha = (Math.sin(s.a) * 0.5 + 0.5) * 0.7 + 0.1;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(200,180,255,${alpha})`; ctx.fill();
      }); requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); init(); }); resize(); init(); draw();
  }
</script>
